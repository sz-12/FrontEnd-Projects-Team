<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Shopping website</title>
</head>
<body>
    <header>
        <!-- Sara's part -->
    </header>

    <main>
        <section class="info-section">
            <h2>When scent meets expectations</h2>
            <div class="cards">
                <a href="pages/soaps/soaps.html" class="card">
                    <div class="box">
                        <img src="images/soaps_Images/soaps_LandingPage.png" alt="Soap">
                    </div>
                    <p>Soaps</p>
                </a>
                <a href="pages/candles/candles.html" class="card">
                    <div class="box">
                        <img src="images/candles_Images/candle_LandingPage.png" alt="Candles">
                    </div>
                    <p>Candles</p>
                </a>
                <a href="pages/perfumes/perfumes.html" class="card">
                    <div class="box">
                        <img src="images/perfumes_Images/perfume_LandingPage.png" alt="Perfume">
                    </div>
                    <p>Perfumes</p>
                </a>
            </div>
        </section>

        <section class="quote-section">
            <div class="quotes">
                <p class="quote">Scent is the most powerful trigger of memory — it lingers long after the moment has passed.</p>    
                <p class="quote-author"><strong>- Inspired by Patrick Süskind</strong></p>
            </div>
        </section>

        <section class="action">
            <div class="action-style">
                <div>
                    <h3>The big EASTER SALE is here! Grab your favorite item !!</h3>
                    <p>Check out our product by clicking any of the items!</p>
                </div>
                <a href="pages/products/products.html">
                    <button>View Products</button>
                </a>
            </div>
        </section>
    </main>

    <footer>
        <!-- Sara's part -->
    </footer>
    
</body>
</html>
